<!DOCTYPE html>
<html>

<head>
  <title>NodeMCU Car</title>
  <style>
    body {
      background-color: #f0f8ff;
      font-family: sans-serif;
      text-align: center;
    }

    h1 {
      font-size: 100px;
      color: white;
      border: 3px solid black;
      -webkit-text-stroke: 2px black;
      background-color: lightblue;
      display: inline-block;
      padding: 10px 50px;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 30px;
      color: black;
      margin-bottom: 50px;
    }

    button {
      font-size: 40px;
      font-weight: bold;
      padding: 40px;
      margin: 20px;
    }

    .container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 40px;
    }
  </style>
  <script>
    function sendCommand(cmd) {
      var xhr = new XMLHttpRequest();
      xhr.open("GET", "http://192.168.4.1/" + cmd, true);
      xhr.send();
    }

    function startCommand(cmd) {
      sendCommand(cmd);
    }

    function stopCommand() {
      sendCommand("stop");
    }
  </script>
</head>

<body>

  <h1>FLUX</h1>
  <h2>NodeMCU Car Push Switch Control</h2>

  <div class="container">
    <button onmousedown="startCommand('forward')" onmouseup="stopCommand()">FORWARD</button>
    <button onmousedown="startCommand('backward')" onmouseup="stopCommand()">BACKWARD</button>
    <button onmousedown="startCommand('left')" onmouseup="stopCommand()">LEFT</button>
    <button onmousedown="startCommand('right')" onmouseup="stopCommand()">RIGHT</button>
  </div>

</body>

</html>
